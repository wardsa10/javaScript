<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  
<button id="likeBtn">Like</button>
<button id="resetBtn">Reset</button>
<p id="likeCount">Likes: 0</p>
<input id="nameInput" type="text" placeholder="Enter your name">
<button id="greetBtn">Greet</button>
<p id="greetMsg"></p>
<input id="liveInput" type="text" placeholder="Type here...">
<p id="liveOutput">Waiting...</p>
<input id="keyInput" type="text" placeholder="Focus and type">
<p id="keyLog"></p>
<ul id="taskList">
<li>Buy groceries</li>
<li>Write code</li>
<li>Read a book</li>
</ul>
<form id="contactForm">
<input id="emailInput" type="email" placeholder="Email">
<input id="subjectInput" type="text" placeholder="Subject">
<button type="submit">Send</button>
</form>
<p id="formStatus"></p>


<script src="./script.js"></script>
</body>
</html>
